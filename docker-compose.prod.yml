services:
  db:
    image: postgres:16
    container_name: rw18_db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-rw18}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: rw18_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: 8080
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-rw18}?sslmode=disable
      JWT_SECRET: ${JWT_SECRET}
      R2_ACCESS_KEY: ${R2_ACCESS_KEY}
      R2_SECRET_KEY: ${R2_SECRET_KEY}
      R2_BUCKET_NAME: ${R2_BUCKET_NAME}
    networks:
      - internal

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}
    container_name: rw18_frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      - API_BASE_URL=http://backend:8080/api/v1
    networks:
      - internal

  nginx:
    image: nginx:alpine
    container_name: rw18_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - internal

  # ========================================================
  # SERVICE PGADMIN (TAMBAHAN BARU)
  # ========================================================
  pgadmin:
    image: dpage/pgadmin4
    container_name: rw18_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@email.com      # Ganti sesuai email keinginan Anda
      PGADMIN_DEFAULT_PASSWORD: adminpassword      # Ganti sesuai password keinginan Anda
    ports:
      - "5050:80"                                 # Akses UI lewat http://localhost:5050
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal

networks:
  internal:

volumes:
  pgdata: